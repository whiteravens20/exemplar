# GitHub Release Notes configuration
# Controls how auto-generated release notes group pull requests.
# Used by the `generate_release_notes: true` step in release.yml workflow.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    # Exclude chore/dependency-only PRs from the main changelog body.
    labels:
      - skip-changelog
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - breaking
        - breaking-change
    - title: "✨ New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "⚡ Performance"
      labels:
        - performance
    - title: "📦 Dependencies"
      labels:
        - dependencies
        - deps
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - refactor
    - title: "📖 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧪 Tests"
      labels:
        - test
        - tests
    - title: "Other Changes"
      labels:
        - "*"
