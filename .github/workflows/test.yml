name: Tests

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/**'
      - '!.github/workflows/test.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        node-version: [22.22.2]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: npm ci --ignore-scripts

      - name: Label quarantined PR
        if: failure() && steps.install.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if npm ci --ignore-scripts --dry-run 2>&1 | grep -qiE "min-release-age|ERESOLVE|could not resolve"; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "min-release-age"
          fi

      - name: Remove quarantine label
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "min-release-age" 2>/dev/null || true

      - name: Run linting
        run: npm run lint --if-present

      - name: Run all tests
        run: npm run test:all

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify required files
        run: |
          test -f src/index.ts || (echo "src/index.ts missing" && exit 1)
          test -f src/deploy-commands.ts || (echo "src/deploy-commands.ts missing" && exit 1)
          test -f tsconfig.json || (echo "tsconfig.json missing" && exit 1)
          test -f package.json || (echo "package.json missing" && exit 1)
          test -f Dockerfile || (echo "Dockerfile missing" && exit 1)
          echo "✅ All required files present"

      - name: Verify environment variables
        run: |
          test -f .env.example || (echo ".env.example missing" && exit 1)
          grep -q "DISCORD_TOKEN" .env.example || (echo "DISCORD_TOKEN not in .env.example" && exit 1)
          grep -q "N8N_WORKFLOW_URL" .env.example || (echo "N8N_WORKFLOW_URL not in .env.example" && exit 1)
          echo "✅ Environment variables configured"

      - name: Node.js version check
        run: |
          REQUIRED_VERSION="22"
          CURRENT_VERSION=$(node -v | cut -d'v' -f2 | cut -d'.' -f1)
          if [ "$CURRENT_VERSION" -lt "$REQUIRED_VERSION" ]; then
            echo "❌ Node.js $REQUIRED_VERSION+ required, got v$(node -v)"
            exit 1
          fi
          echo "✅ Node.js version OK: v$(node -v)"

      - name: Package.json validation
        run: |
          npm ls --depth=0 2>&1 | grep -q "ERR!" && (echo "❌ Package.json has issues" && exit 1) || echo "✅ Package.json OK"
