name: Tests

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/**'
      - '!.github/workflows/test.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Update npm to 11+
        run: npm install -g npm@latest

      - name: Install dependencies
        id: install
        run: npm ci --ignore-scripts

      - name: Label quarantined PR
        if: failure() && steps.install.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if npm ci --ignore-scripts --dry-run 2>&1 | grep -qiE "min-release-age|ERESOLVE|could not resolve"; then
            gh pr edit "$PR_NUMBER" --add-label "min-release-age"
          fi

      - name: Remove quarantine label
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "min-release-age" 2>/dev/null || true

      - name: Run linting
        run: npm run lint --if-present

      - name: Run all tests
        run: npm run test:all

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify required files
        run: |
          test -f src/index.ts || (echo "src/index.ts missing" && exit 1)
          test -f src/deploy-commands.ts || (echo "src/deploy-commands.ts missing" && exit 1)
          test -f tsconfig.json || (echo "tsconfig.json missing" && exit 1)
          test -f package.json || (echo "package.json missing" && exit 1)
          test -f Dockerfile || (echo "Dockerfile missing" && exit 1)
          echo "✅ All required files present"

      - name: Verify environment variables
        run: |
          test -f .env.example || (echo ".env.example missing" && exit 1)
          grep -q "DISCORD_TOKEN" .env.example || (echo "DISCORD_TOKEN not in .env.example" && exit 1)
          grep -q "N8N_WORKFLOW_URL" .env.example || (echo "N8N_WORKFLOW_URL not in .env.example" && exit 1)
          echo "✅ Environment variables configured"

      - name: Package.json validation
        run: |
          npm ls --depth=0 2>&1 | grep -q "ERR!" && (echo "❌ Package.json has issues" && exit 1) || echo "✅ Package.json OK"
